<!doctype html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة عجلة الحظ - أميرة بدير</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Cairo', sans-serif; direction: rtl; }
    @keyframes resultReveal { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes confettiBurst {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity: 0; }
    }
    .result-reveal { animation: resultReveal 0.5s cubic-bezier(0.34,1.56,0.64,1); }
    .confetti-dot {
      position: absolute; width: 8px; height: 8px; border-radius: 50%;
      animation: confettiBurst 1s ease-out forwards;
    }
    #wheel-canvas { transition: transform 0s; }
    #wheel-canvas.spinning { transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
    .frost { background: rgba(255,255,255,0.08); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
 </head>
 <body class="w-full min-h-screen relative overflow-x-hidden" style="background: rgb(15, 23, 42);">
  <div class="fixed inset-0 pointer-events-none" style="opacity:0.04; mix-blend-mode:overlay; z-index:50;">
    <svg width="100%" height="100%"><filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"></feTurbulence>
      <feColorMatrix type="saturate" values="0"></feColorMatrix>
     </filter> <rect width="100%" height="100%" filter="url(#grain)"></rect>
    </svg>
  </div>

  <main class="relative z-10 w-full max-w-5xl mx-auto px-6 py-10">
   <!-- Huge Branding by Amira Bedair -->
   <div class="text-center mb-10">
     <p class="text-slate-400 text-sm tracking-widest font-bold uppercase mb-1">DESIGNED BY</p>
     <h2 class="text-4xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-rose-400 via-pink-500 to-amber-400 tracking-wide filter drop-shadow">
       أميرة بدير ✨
     </h2>
     <div class="w-24 h-1 bg-gradient-to-r from-rose-500 to-amber-500 mx-auto mt-3 rounded-full opacity-70"></div>
   </div>

   <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">

    <!-- Left Column: Header + Scoreboard -->
    <div class="flex flex-col gap-6 text-right">
     <header>
      <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-l from-amber-400 to-rose-500 tracking-tight leading-tight">عجلة الحظ: التحدي الـمُرعب! 🔥</h1>
      <p class="mt-3 text-slate-400 text-lg">لف العجلة، نفّذ التحدي، وحافظ على الـ Streak بتاعك من الانهيار.. الأسئلة مستحيل تتكرر!</p>
     </header>

     <!-- Streak Dashboard -->
     <div class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-6 flex justify-around items-center text-center shadow-xl">
       <div>
         <p class="text-slate-400 text-sm">الـ Streak الحالي 🎯</p>
         <p id="streak-count" class="text-4xl font-black text-emerald-400 mt-1">0</p>
       </div>
       <div class="h-12 w-[1px] bg-slate-700"></div>
       <div>
         <p class="text-slate-400 text-sm">أعلى Streak بالقعدة 🏆</p>
         <p id="max-streak" class="text-4xl font-black text-amber-400 mt-1">0</p>
       </div>
     </div>

     <!-- Closed Categories Display (Read Only) -->
     <div class="w-full rounded-2xl p-5 bg-slate-800/50 border border-slate-700/60">
      <p class="text-slate-300 font-semibold mb-3 text-sm flex items-center gap-2">
        <i data-lucide="lock" class="w-4 h-4 text-rose-400"></i> فئات التحدي المحمية:
      </p>
      <div id="chips" class="flex flex-wrap gap-2 justify-start"></div>
     </div>
    </div>

    <!-- Right Column: Wheel + Result Display -->
    <div class="flex flex-col items-center gap-8">
     <div class="relative">
      <!-- Pointer -->
      <div class="absolute top-[-20px] left-1/2 -translate-x-1/2 z-20 w-0 h-0" style="border-left:14px solid transparent;border-right:14px solid transparent;border-top:22px solid #f43f5e;"></div>
      <canvas id="wheel-canvas" width="840" height="840" class="rounded-full shadow-2xl border-4 border-slate-700" style="width:min(400px,100vw);height:min(400px,100vw);"></canvas>
     </div>

     <button id="spin-btn" class="w-48 bg-gradient-to-r from-amber-500 to-rose-600 text-white font-black text-2xl py-4 rounded-full shadow-lg shadow-rose-900/30 hover:scale-105 active:scale-95 transition-transform">
       إلعب! 🎲
     </button>

     <!-- Dynamic Question Pop-up Card -->
     <div id="result-area" class="w-full rounded-2xl p-6 text-center hidden relative overflow-hidden frost border border-white/10 shadow-2xl">
      <p id="result-category" class="text-xs uppercase font-bold tracking-widest text-rose-400"></p>
      <p id="result-question" class="text-xl font-bold mt-2 text-white leading-relaxed px-2"></p>

      <!-- Action Buttons -->
      <div class="flex gap-3 justify-center mt-5">
        <button id="action-success" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-sm px-6 py-2 rounded-full transition-colors shadow-lg">نفّذت الإجابة ✅</button>
        <button id="action-fail" class="bg-slate-700 hover:bg-rose-950 text-slate-300 hover:text-white font-bold text-sm px-6 py-2 rounded-full transition-colors">انسحاب ❌</button>
      </div>
     </div>
    </div>

   </div>
  </main>

  <script>
    const COLORS = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#06b6d4'];
    const items = ['فضفضة', 'اعتراف صريح', 'لو كنت..؟', 'تحدّي مجنون', 'ورطة وصدمة', 'المصيبة الكبرى 🔥'];

    // Massive question bank with NO repetition logic
    const ORIGINAL_QUESTION_BANK = {
      'فضفضة': [
        "إيه أكتر تصرف غريب ومحرج عملته وأنت صغير ولسة فاكره؟",
        "مين الشخص اللي في القعدة دي اللي ممكن تأتمنه على سر خطير وليه؟",
        "إيه أكتر حاجة بتخاف منها ومبتسمحش لحد يعرفها عنك؟",
        "إيه أجمل ذكرى من أيام المدرسة ومستحيل تنساها؟",
        "مين أكتر شخص هنا بيفهمك من غير ما تتكلم؟",
        "إيه الصفة اللي نفسك الناس تبطل تاخد انطباع عنك بسببها؟",
        "أخر مرة عيطت فيها كانت امتى وليه؟ لو مش حابب تفاصيل قول السبب العام."
      ],
      'اعتراف صريح': [
        "إيه آخر كذبة كذبتها وعلى مين؟ وبصراحة!",
        "قول صفة واحدة غلسة في الشخص اللي قاعد على شمالك ومتقدرش تغيرها.",
        "هل عمرك فتشت في موبايل حد من وراه؟ اعترف!",
        "إيه أكتر حاجة بتندم عليها في حياتك لحد دلوقتي؟",
        "هل في شخص في القاعدة دي كنت بتكرهه وأول ما عرفته حبّيته؟",
        "إيه العادة السرية التافهة اللي بتعملها وأنت لوحدك في الأوضة؟",
        "مين هنا الشخص اللي شايف إن ذوقه في اللبس محتاج تعديل سريع؟"
      ],
      'لو كنت..؟': [
        "لو معاك مليون جنيه كاش دلوقتي حالا، إيه أول حاجة تافهة هتشتريها؟",
        "لو تقدر تختفي لمدة ساعة كاملة، هتروح فين وتعمل إيه؟",
        "لو اضطريت تعيش في جزيرة مهجورة مع شخص واحد من القاعدة دي، هتختار مين؟",
        "لو اتقال لك إنك هترجع بالزمن وتغير قرار واحد بس، هيكون إيه؟",
        "لو كنت ممثل، إيه الدور أو الشخصية اللي كنت تحب تعملها؟",
        "لو تقدر تختار قوة خارقة واحدة (طيران، قراءة أفكار، خفاء) هتختار إيه؟",
        "لو صحيت لقيت نفسك بقيت رئيس دولة ليوم واحد، إيه أول قرار هتاخده؟"
      ],
      'تحدّي مجنون': [
        "اطلب دليفري في الموبايل وقوله نكتة واقفل السكة فورا!",
        "اعمل 15 ضغط (Push-ups) دلوقتي حالا قدام الكل بدون توقف.",
        "سيب الشخص اللي على يمينك يغير الحالة (Status) بتاعتك على واتساب بعبارة غريبة لمدة ساعة.",
        "غني مقطع من أغنية شعبية بأعلى صوت عندك في الأوضة دلوقتي!",
        "اتكلم باللغة العربية الفصحى لمدة دورتين كاملين في اللعبة وماتخرجش عن الشخصية.",
        "خلي اللي جنبك يختار حد من جهات اتصالك وتبعت له رسالة مكتوب فيها: 'أنا مراقبك'!",
        "اعمل نفسك بتبكي لمدة دقيقة كاملة وإقناعنا إنك زعلان بجد."
      ],
      'ورطة وصدمة': [
        "تختار تعيش من غير موبايل وإنترنت لمدة أسبوع، ولا من غير أكلك المفضل لمدة سنة؟",
        "لو اتقال لك إنك لازم تلغي صداقتك مع حد هنا عشان تكسب رحلة حول العالم، هتختار مين؟",
        "إيه الموقف اللي لو حصلك دلوقتي حالا تتمنى الأرض تنشق وتبلعك؟",
        "تختار تاكل معلقة شطة كاملة دلوقتي ولا تورينا أخر شات مع الـ Ex أو الكراش؟",
        "تختار تعيش طول حياتك بتسمع صوت واحد بس بيزن في ودنك، ولا تشم ريحة وحشة طول الوقت؟",
        "لو خيروك تعيش في بيت مسكون لوحدك شهر، ولا تسافر مع أكتر شخص بتكرهه سنة كاملة؟",
        "تختار تفقد القدرة على الكلام لمدة شهر، ولا تفقد الموبايل تلات شهور؟"
      ],
      'المصيبة الكبرى 🔥': [
        "افتح آخر شات على واتساب عندك واقرأ آخر 4 رسايل بصوت عالي قدام الكل دون أي تعديل!",
        "ورينا آخر صورة عندك في الـ Gallery (الاستوديو) بدون أي تردد وبكل أمانة.",
        "اتصل بـ (الـ Ex أو كراش أو والدك) وقوله 'أنا عملت مصيبة ومحتاجك' واقفل السكة فورا!",
        "سيب موبايلك مفتوح في يد الشخص اللي على شمالك لمدة دقيقتين كاملين يفتش براحته!",
        "قول سر خطير جداً عن نفسك محدش من اللي قاعدين يعرفه نهائي ومستحيل كنت تقوله.",
        "اتصل برقم عشوائي من موبايلك وقوله 'أنا بحبك' أول ما يرد واقفل على طول!",
        "اعترف بموقف عملت فيه ندالة مع حد من صحابك اللي قاعدين وميعرفش إنك أنت السبب."
      ]
    };

    // Deep clone the bank to manage remaining questions
    let dynamicQuestionBank = JSON.parse(JSON.stringify(ORIGINAL_QUESTION_BANK));

    let spinning = false;
    let currentRotation = 0;
    let streak = 0;
    let maxStreak = 0;

    const canvas = document.getElementById('wheel-canvas');
    const ctx = canvas.getContext('2d');
    const chipsEl = document.getElementById('chips');
    const spinBtn = document.getElementById('spin-btn');
    const resultArea = document.getElementById('result-area');
    const resultCategory = document.getElementById('result-category');
    const resultQuestion = document.getElementById('result-question');
    const streakCountEl = document.getElementById('streak-count');
    const maxStreakEl = document.getElementById('max-streak');

    function drawWheel() {
      const w = canvas.width, h = canvas.height, cx = w/2, cy = h/2, r = w/2 - 10;
      ctx.clearRect(0,0,w,h);
      const arc = (Math.PI*2)/items.length;

      items.forEach((item, i) => {
        const start = i * arc, end = start + arc;
        ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length]; ctx.fill();
        ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 6; ctx.stroke();

        ctx.save(); ctx.translate(cx,cy); ctx.rotate(start + arc/2);
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#ffffff';
        ctx.font = `bold ${Math.min(32, 260/items.length)}px 'Cairo', sans-serif`;
        ctx.fillText(item, r - 30, 0);
        ctx.restore();
      });

      ctx.beginPath(); ctx.arc(cx, cy, 25, 0, Math.PI*2); ctx.fillStyle = '#ffffff'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx, cy, 15, 0, Math.PI*2); ctx.fillStyle = '#1e293b'; ctx.fill();
    }

    function renderChips() {
      chipsEl.innerHTML = '';
      items.forEach((item, i) => {
        const chip = document.createElement('span');
        chip.className = 'inline-flex items-center px-3 py-1.5 rounded-full text-xs font-semibold text-white shadow-sm';
        chip.style.background = COLORS[i % COLORS.length];
        chip.textContent = item;
        chipsEl.appendChild(chip);
      });
    }

    function spawnConfetti() {
      for (let i = 0; i < 40; i++) {
        const dot = document.createElement('div');
        dot.className = 'confetti-dot';
        dot.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
        const angle = Math.random() * Math.PI * 2;
        const distance = 80 + Math.random() * 140;
        dot.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
        dot.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
        dot.style.setProperty('--rot', Math.random() * 720 + 'deg');
        dot.style.left = '50%'; dot.style.top = '50%';
        dot.style.transform = 'translate(-50%, -50%)';
        dot.style.width = (5 + Math.random() * 8) + 'px'; dot.style.height = dot.style.width;
        dot.style.animationDuration = (1.0 + Math.random() * 0.5) + 's';
        resultArea.appendChild(dot);
        setTimeout(() => dot.remove(), 1800);
      }
    }

    spinBtn.addEventListener('click', () => {
      if (spinning) return;
      spinning = true;
      spinBtn.disabled = true;
      spinBtn.style.opacity = '0.4';
      resultArea.classList.add('hidden');

      const totalDeg = (6 + Math.random()*4)*360 + Math.random()*360;
      currentRotation += totalDeg;
      canvas.classList.add('spinning');
      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(() => {
        canvas.classList.remove('spinning');
        spinning = false;
        spinBtn.disabled = false;
        spinBtn.style.opacity = '1';

        const normalizedRotation = (currentRotation % 360 + 360) % 360;
        const topAngle = (270 - normalizedRotation + 360) % 360;
        const segmentAngle = 360 / items.length;
        const winIdx = Math.floor(topAngle / segmentAngle) % items.length;

        const selectedCategory = items[winIdx];
        resultCategory.textContent = `🎯 الفئة المقدرة لك: ${selectedCategory}`;

        // Anti-repetition check and automatic reset logic
        if (!dynamicQuestionBank[selectedCategory] || dynamicQuestionBank[selectedCategory].length === 0) {
          dynamicQuestionBank[selectedCategory] = [...ORIGINAL_QUESTION_BANK[selectedCategory]];
        }

        // Pick and extract the question so it's not repeated
        const pool = dynamicQuestionBank[selectedCategory];
        const randomIdx = Math.floor(Math.random() * pool.length);
        const chosenQuestion = pool.splice(randomIdx, 1)[0];

        resultQuestion.textContent = chosenQuestion;
        resultArea.classList.remove('hidden');
        spawnConfetti();
      }, 4100);
    });

    document.getElementById('action-success').addEventListener('click', () => {
      streak++;
      streakCountEl.textContent = streak;
      if (streak > maxStreak) { maxStreak = streak; maxStreakEl.textContent = maxStreak; }
      resultArea.classList.add('hidden');
    });

    document.getElementById('action-fail').addEventListener('click', () => {
      streak = 0;
      streakCountEl.textContent = streak;
      alert("❌ يا جبان! الـ Streak بتاعك اتمسح وبقى صفر.. الدور على اللي بعدك!");
      resultArea.classList.add('hidden');
    });

    renderChips(); drawWheel(); lucide.createIcons();
  </script>
 </body>
</html>
